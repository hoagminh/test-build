services:
  # ── Next.js App ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner           # build tới stage cuối (production)
    container_name: nextjs_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # Thêm các biến môi trường khác ở đây, hoặc dùng .env file:
      # env_file:
      #   - .env.production
    networks:
      - app_network

  # ── (Tuỳ chọn) Nginx Reverse Proxy ─────────────────────────
  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx_proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - app_network

networks:
  app_network:
    driver: bridge
